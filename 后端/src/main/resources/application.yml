server:
  port: 8080

spring:
  application:
    name: zhimian-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhimian?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    # 数据库密码：优先读环境变量 DB_PASSWORD；未设置时回退到本地开发默认值 123456。
    # 生产环境请用 prod profile（application-prod.yml），那里强制要求注入 DB_PASSWORD。
    password: ${DB_PASSWORD:123456}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # JWT 签名密钥：优先读环境变量 JWT_SECRET；未设置时回退到本地开发占位值。
  # 注意：HS256 要求密钥至少 256 位（32 个 ASCII 字符），故此默认值需足够长。
  # 该默认值仅供本地开发使用，生产环境必须通过 JWT_SECRET 环境变量注入随机密钥。
  secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me-123456}
  # token 有效期（毫秒），默认 7 天
  expiration: 604800000

# AI 大模型配置（DeepSeek，OpenAI 兼容接口）
ai:
  provider: deepseek
  base-url: https://api.deepseek.com
  api-key: ${AI_API_KEY:在这里填你的DeepSeek_API_Key}
  model: deepseek-chat
  # 是否启用真实 AI 调用；false 时使用内置规则/模拟（无 key 也能演示）
  enabled: true
  # 调用超时（毫秒），同时作为连接与读取超时
  timeout-ms: 20000

# CORS 允许的前端来源（逗号分隔）。开发默认放行本地 Vite 前端，避免影响本地联调。
# 生产环境用固定白名单（见 application-prod.yml），不再使用通配符。
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging:
  level:
    com.zhimian: debug
